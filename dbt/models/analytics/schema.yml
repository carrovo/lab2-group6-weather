version: 2

models:
  - name: weather_daily_metrics
    description: "Daily historical weather metrics with moving average and day-over-day change"
    columns:
      - name: location_name
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: actual_temp
        tests:
          - not_null

  - name: weather_forecast_overview
    description: "Historical and forecast weather values for dashboarding"
    columns:
      - name: location_name
        tests:
          - not_null
      - name: date
        tests:
          - not_null